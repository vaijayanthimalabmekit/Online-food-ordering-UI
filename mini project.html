<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Online Food Ordering UI</title>

<style>
    body {
        font-family: Arial, sans-serif;
        margin: 0;
        background: #f4f4f4;
    }

    header {
        background: #ff5722;
        color: white;
        padding: 15px;
        text-align: center;
    }

    .container {
        display: flex;
        flex-wrap: wrap;
        padding: 10px;
    }

    .menu, .cart {
        flex: 1;
        min-width: 300px;
        margin: 10px;
        background: white;
        padding: 15px;
        border-radius: 10px;
    }

    .item {
        display: flex;
        justify-content: space-between;
        margin: 10px 0;
    }

    button {
        background: #ff5722;
        color: white;
        border: none;
        padding: 5px 10px;
        cursor: pointer;
        border-radius: 5px;
    }

    button:hover {
        background: #e64a19;
    }

    .total {
        font-weight: bold;
        margin-top: 15px;
    }

    @media (max-width: 600px) {
        .container {
            flex-direction: column;
        }
    }
</style>
</head>

<body>

<header>
    <h1>🍔 Food Ordering App</h1>
</header>

<div class="container">

    <!-- MENU -->
    <div class="menu">
        <h2>Menu</h2>

        <div class="item">
            <span>Pizza - ₹200</span>
            <button onclick="addToCart('Pizza', 200)">Add</button>
        </div>

        <div class="item">
            <span>Burger - ₹120</span>
            <button onclick="addToCart('Burger', 120)">Add</button>
        </div>

        <div class="item">
            <span>Pasta - ₹150</span>
            <button onclick="addToCart('Pasta', 150)">Add</button>
        </div>

        <div class="item">
            <span>Juice - ₹80</span>
            <button onclick="addToCart('Juice', 80)">Add</button>
        </div>
    </div>

    <!-- CART -->
    <div class="cart">
        <h2>Cart</h2>
        <ul id="cartList"></ul>
        <p class="total">Total: ₹<span id="total">0</span></p>
    </div>

</div>

<script>
    let total = 0;

    function addToCart(item, price) {
        const cartList = document.getElementById("cartList");

        const li = document.createElement("li");
        li.textContent = item + " - ₹" + price;

        cartList.appendChild(li);

        total += price;
        document.getElementById("total").textContent = total;
    }
</script>

</body>
</html>
